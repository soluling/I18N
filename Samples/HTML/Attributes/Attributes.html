<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bold Tag Attributes</title>
</head>
<body>

  <p>This is <b id="highlight" class="bold-text" title="This text is bold" style="color: red;">bold and styled</b> text.</p>

  <p>This is <b id="one" title="Tooltip on bold text" style="color: blue;">bold</b> and <b id="two" title="Tooltip on bold text" style="color: green;">this</b> too.</p>

  <p><b id="main-bold" lang="fr">Bonjour</b> — this bold word is marked as French.</p>

</body>
</html>
